name: Deploy Dashboard to AWS (ECR/App Runner)

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: maderera-dashboard
  IMAGE_TAG: latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: $\{{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: $\{{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: $\{{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir, etiquetar y subir la imagen de Docker a Amazon ECR
        env:
          ECR_REGISTRY: $\{{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -f ops/Dockerfile.dashboard -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "La imagen se ha subido exitosamente a AWS ECR."
          echo "Para desplegar en App Runner, puedes configurarlo para que tome siempre el tag 'latest'."
