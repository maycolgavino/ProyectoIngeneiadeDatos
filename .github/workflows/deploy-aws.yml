name: Deploy to AWS ECS (Fargate)

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: maderera-bronze-repo
  ECS_CLUSTER: maderera-cluster
  ECS_TASK_DEFINITION: .github/aws/task-definition.json
  CONTAINER_NAME: maderera-generador

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: $\{{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: $\{{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: $\{{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compilar y subir imagen a Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: $\{{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: $\{{ github.sha }}
        run: |
          docker build -f ops/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Ejecutar ECS Task
        # Al no tener un cluster Always-On en github actions, ejecutamos el task 
        # como un proceso Batch / One-off con AWS CLI para simular el cronjob.
        run: |
          aws ecs run-task \
            --cluster $\{{ env.ECS_CLUSTER }} \
            --task-definition maderera-bronze-task \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$\{{ secrets.SUBNET_ID }}],securityGroups=[$\{{ secrets.SG_ID }}],assignPublicIp='ENABLED'}"
