name: Deploy Dashboard to Azure (App Service)

on:
  workflow_dispatch:

env:
  ACR_NAME: madereraregistry
  APP_NAME: maderera-dashboard-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login a Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Construir y Subir imagen Docker
        run: |
          IMAGE_TAG=${{ env.ACR_NAME }}.azurecr.io/maderera-dashboard:latest
          docker build -f ops/Dockerfile.dashboard -t $IMAGE_TAG .
          docker push $IMAGE_TAG

      - name: Desplegar en Azure Web App for Containers
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/maderera-dashboard:latest
